# MMOItems Reforge Tier System (Quality System Configuration)
# During reforge, a quality tier is randomly selected based on weight, and corresponding stat modifiers are applied
# Tier IDs must match tier IDs configured in MMOItems (lowercase)
# For example, if MMOItems tier file defines COMMON, UNCOMMON, RARE, etc.
# Then you should use common, uncommon, rare as tier IDs here

# Tier configuration
tiers:
  # Common tier - corresponds to MMOItems COMMON tier
  common:
    display-name: "&7Common"  # Tier display name (used in debug logs)
    weight: 50              # Weight (higher = more common)
    name-prefix: "&7"      # Item name prefix (color code)
    name-suffix: ""        # Item name suffix
    tooltip-style: "minecraft:common"  # Tooltip style (1.20.5+ feature)
    # Drop effect configuration (optional, similar to MythicMobs drop effects)
    drop-effect:
      glow: false           # Item glow when dropped
      show-name: false      # Show item name above dropped item
      vfx:
        enabled: false      # Enable visual effects
        material: "POTION" # VFX material (any Material type)
        model-data: 0       # Custom model data for VFX
        color: "#FFFFFF"   # VFX color in hex format
    stat-modifiers:         # Stat modifiers (Fixed value bonus)
      # Format: Fixed value bonus - adds fixed value to base stat
      # Example: ATTACK_DAMAGE: 0 means no bonus
      # Use "+5" or "5" format, both work the same
      ATTACK_DAMAGE: 0
      ATTACK_SPEED: 0
      
  # Uncommon tier - corresponds to MMOItems UNCOMMON tier
  uncommon:
    display-name: "&aUncommon"
    weight: 30
    name-prefix: "&a"      # Green
    name-suffix: ""
    tooltip-style: "minecraft:uncommon"  # Tooltip style (1.20.5+ feature)
    drop-effect:
      glow: true            # Item glow when dropped
      glow-color: "GREEN"   # Glow color (optional): BLACK, DARK_BLUE, DARK_GREEN, DARK_AQUA, DARK_RED, DARK_PURPLE, GOLD, GRAY, DARK_GRAY, BLUE, GREEN, AQUA, RED, LIGHT_PURPLE, YELLOW, WHITE
      show-name: true       # Show item name above dropped item
      vfx:
        enabled: false
        material: "POTION"
        model-data: 0
        color: "#a8ff8f"
    stat-modifiers:
      # Fixed value bonus - adds fixed value to base stat
      # Example: ATTACK_DAMAGE: 2 means +2 attack damage
      ATTACK_DAMAGE: 2
      ATTACK_SPEED: 1
      
  # Rare tier - corresponds to MMOItems RARE tier
  rare:
    display-name: "&bRare"
    weight: 15
    name-prefix: "&b"      # Cyan
    name-suffix: ""
    tooltip-style: "minecraft:rare"  # Tooltip style (1.20.5+ feature)
    drop-effect:
      glow: true
      glow-color: "AQUA"    # Cyan/Aqua glow
      show-name: true
      vfx:
        enabled: true       # Enable VFX for rare items
        material: "POTION"
        model-data: 1
        color: "#55FFFF"
    stat-modifiers:
      # Fixed value bonus
      ATTACK_DAMAGE: 4
      ATTACK_SPEED: 2
      CRITICAL_STRIKE_CHANCE: 5  # Adds new attribute if item doesn't have it
      
  # Epic tier - corresponds to MMOItems EPIC tier
  epic:
    display-name: "&5Epic"
    weight: 4
    name-prefix: "&5"      # Purple
    name-suffix: ""
    tooltip-style: "minecraft:epic"  # Tooltip style (1.20.5+ feature)
    drop-effect:
      glow: true
      glow-color: "LIGHT_PURPLE"  # Purple glow for epic
      show-name: true
      vfx:
        enabled: true
        material: "POTION"
        model-data: 2
        color: "#AA00FF"
    stat-modifiers:
      # Fixed value bonus
      ATTACK_DAMAGE: 7
      ATTACK_SPEED: 3
      CRITICAL_STRIKE_CHANCE: 10
      CRITICAL_STRIKE_POWER: 15
      
  # Legendary tier - corresponds to MMOItems LEGENDARY tier
  legendary:
    display-name: "&6Legendary"
    weight: 1
    name-prefix: "&6"      # Gold
    name-suffix: ""
    tooltip-style: "minecraft:legendary"  # Tooltip style (1.20.5+ feature)
    drop-effect:
      glow: true
      show-name: true
      vfx:
        enabled: true
        material: "POTION"
        model-data: 3
        color: "#FFD700"
    stat-modifiers:
      # Fixed value bonus
      ATTACK_DAMAGE: 10
      ATTACK_SPEED: 5
      CRITICAL_STRIKE_CHANCE: 15
      CRITICAL_STRIKE_POWER: 25
      MAX_HEALTH: 10

# Preserve tier on reforge
preserve-tier-on-reforge: false    # Whether to preserve current tier on reforge (false = re-randomize tier)

# Notes:
# 1. Tier IDs must match tier IDs in MMOItems configuration (lowercase)
# 2. After reforge, MMOITEMS_TIER NBT is automatically set, LiveMMOItem will display corresponding tier lore
# 3. display-name is only used for debug log display, not shown on items
# 4. name-prefix and name-suffix are used to modify item names after reforge, format: prefix + original name + suffix
# 5. Example: Common tier name-prefix="&7", original name="Sword", final display is "&7Sword"
