# MMOitemsReforge 数据库配置

# 数据存储方式: FILE, SQLITE, H2, MYSQL
# FILE   - 使用 YAML 文件存储（默认，无需额外依赖）
# SQLITE - 使用 SQLite 嵌入式数据库
# H2     - 使用 H2 嵌入式数据库
# MYSQL  - 使用 MySQL 远程数据库
data-storage-method: FILE

# SQLite 配置
SQLite:
  file: 'mmoreforge'
  table-prefix: mmoreforge_

# H2 数据库配置
H2:
  file: 'mmoreforge'
  table-prefix: mmoreforge_

# MySQL 数据库配置
MySQL:
  host: 'localhost'
  port: '3306'
  user: 'root'
  password: 'password'
  database: 'minecraft'
  connection-parameters: '?autoReconnect=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8'
  Pool-Settings:
    max-pool-size: 10
    min-idle: 10
    max-lifetime: 180000
    keep-alive-time: 60000
    time-out: 20000
  table-prefix: mmoreforge_
