# Custom Equipment Reforge Materials Configuration
# For specific items, matches by item-id (TYPE:ID format)

# Excalibur Sword - Custom materials
# item-id format: MMOItemsType:ItemID (e.g., SWORD:EXCALIBUR)
SWORD:EXCALIBUR:
  item-id: "SWORD:EXCALIBUR"
  materials:
    - type: VANILLA
      id: DIAMOND
      amount: 5
      display-name: "&bDiamond"
    - type: VANILLA
      id: GOLD_INGOT
      amount: 10
      display-name: "&6Gold Ingot"
    - type: MMOITEMS:MATERIAL
      id: MAGIC_DUST
      amount: 10
      display-name: "&dMagic Dust"

