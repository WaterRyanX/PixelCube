# Armor Reforge Materials Configuration
# Matches by vanilla item type (HELMET/CHESTPLATE/LEGGINGS/BOOTS)

# Helmet
# Matches all items ending with _HELMET (e.g., IRON_HELMET, DIAMOND_HELMET)
HELMET:
  materials:
    - type: VANILLA
      id: LEATHER
      amount: 3
      display-name: "&6Leather"
    - type: VANILLA
      id: IRON_INGOT
      amount: 2
      display-name: "&fIron Ingot"

# Chestplate
# Matches all items ending with _CHESTPLATE and ELYTRA
CHESTPLATE:
  materials:
    - type: VANILLA
      id: IRON_INGOT
      amount: 6
      display-name: "&fIron Ingot"
    - type: VANILLA
      id: LEATHER
      amount: 2
      display-name: "&6Leather"

# Leggings
LEGGINGS:
  materials:
    - type: VANILLA
      id: IRON_INGOT
      amount: 5
      display-name: "&fIron Ingot"
    - type: VANILLA
      id: LEATHER
      amount: 2
      display-name: "&6Leather"

# Boots
BOOTS:
  materials:
    - type: VANILLA
      id: LEATHER
      amount: 3
      display-name: "&6Leather"
    - type: VANILLA
      id: IRON_INGOT
      amount: 2
      display-name: "&fIron Ingot"
