# 武器类重铸材料配置
# Weapons Reforge Materials Configuration
# 每个顶级键是 MMOItems 装备类型

# 材料类型说明:
# - type: VANILLA  (原版物品，id 为 Minecraft 物品ID如 IRON_INGOT)
# - type: MMOITEM  (MMOItems 物品，需要额外指定 mmoitem-type)
# - type: MATERIAL (MMOItems MATERIAL 类型的简写)

# 剑类武器 (SWORD)
