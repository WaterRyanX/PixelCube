# 强化成功率配置文件

# 强化成功率配置
# 格式: "等级" 或 "最小-最大" : 成功率 (0.0-1.0)
success-rates:
  "1-3": 1.0      # 1-3级: 100%成功
  "4-5": 0.9      # 4-5级: 90%成功
  "6-7": 0.8      # 6-7级: 80%成功
  "8-9": 0.7      # 8-9级: 70%成功
  "10-15": 0.6       # 10-15: 60%成功
  "16-18": 0.5       # 16-20: 50%成功

# 无品质物品的默认最大等级
default-max-level: 10

# 按品质(MMOITEMS_TIER)定义最大强化等级
tier-max-levels:
  COMMON: 10
  UNCOMMON: 12
  RARE: 14
  EPIC: 16
  LEGENDARY: 18

# 指定物品的强化上限 (TYPE:ID 格式)
# 优先级: max(物品上限, 品质上限)
# 示例:
item-max-levels:
  # "SWORD:STARTER_SWORD": 3
  # "ARMOR:MYTHIC_ARMOR": 20
