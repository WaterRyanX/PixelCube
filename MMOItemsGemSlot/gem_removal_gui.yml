# 宝石拆卸 GUI 配置
# 宝石拆卸界面配置

# GUI 设置
title: "<shift:-6>§f츼"
rows: 3

slots:
  item: 11       # 物品放置槽位
  info: 8        # 信息显示槽位
  tool: 22       # 宝石拆卸器槽位
  # 宝石显示槽位 - 显示宝石的槽位编号列表
  # 根据你的最大宝石容量添加足够的槽位
  gem-display:
    - 15
    - 16
    - 17
    - 24
    - 25
    - 26
  filler:        # 填充物品
    enabled: false  # 设置为 false 禁用填充（使用空气代替）
    material: PAPER
    display-name: " "
    custom-model-data: 800001
    #item-model: ""  # 可选：设置 1.21+ 的自定义物品模型

item-display:
  material: PAPER
  display-name: "&e放置物品"
  custom-model-data: 810001
  #item-model: ""  # 可选：设置 1.21+ 的自定义物品模型
  lore:
    - "&7在此处放置已镶嵌宝石的物品"
    - "&7点击下方宝石进行拆卸"

info-display:
  material: PAPER
  display-name: "&a宝石拆卸"
  custom-model-data: 800001
  #item-model: ""  # 可选：设置 1.21+ 的自定义物品模型
  # 占位符：
  # {gem-count} - 已镶嵌宝石数量
  # {cost} - 金钱花费
  # {exp-cost} - 经验花费
  lore:
    no-item:
      - "&7请放置一个有宝石的物品"
    no-gems:
      - "&c此物品没有已镶嵌的宝石"
    has-gems:
      - "&7已镶嵌宝石: &6{gem-count}"
      - "&7点击下方宝石进行拆卸"
      - ""
      - "&e每次拆卸花费: &6{cost}"
      - "&e每次拆卸经验花费: &6{exp-cost} 经验"

# 宝石显示配置
# 材质和自定义模型数据直接从宝石物品获取
gem-display:
  # 占位符：
  # {gem-color} - 宝石颜色/类型
  # {index} - 宝石索引编号
  lore:
    has-tool:
      - "&7类型: &6{gem-color}"
      - "&7序号: &6#{index}"
      - ""
      - "&e点击拆卸此宝石"
    no-tool:
      - "&7类型: &6{gem-color}"
      - "&7序号: &6#{index}"
      - ""
      - "&c无法拆卸: 需要宝石拆卸器!"
  # 宝石属性显示配置
  attribute-display:
    enabled: true  # 设置为 false 隐藏宝石属性
    header:
      - ""  # 属性前的空行
      - "&e宝石属性:"
    # 占位符：
    # {attribute-name} - 属性显示名称
    # {attribute-value} - 属性值（带颜色）
    format: "  &7{attribute-name}: {attribute-value}"

tool-display:
  material: PAPER
  display-name: "&e放置拆卸器"
  custom-model-data: 800001
  #item-model: ""  # 可选：设置 1.21+ 的自定义物品模型
  lore:
    - "&7在此处放置宝石拆卸器"
    - "&7拆卸宝石需要此工具"

# 自定义按钮 - 可配置多个不同操作的按钮
custom-buttons:
  close-button:
    enabled: true          # 设置为 true 启用此按钮
    slot: 0                # 按钮槽位位置 (0-53)
    material: PAPER       # 按钮物品材质
    display-name: "&c关闭"   # 按钮名称
    custom-model-data: 800001
    #item-model: ""  # 可选：设置 1.21+ 的自定义物品模型
    lore:                   # 按钮描述
      - "&7点击关闭界面"
    action: close           # 操作类型: close 或 command
    command: ""             # action 为 command 时执行的命令（不带 /），支持 {player} 占位符

  # 示例：额外的自定义按钮
  # help-button:
  #   enabled: false
  #   slot: 48
  #   material: BOOK
  #   display-name: "&e帮助"
  #   custom-model-data: 0
  #   lore:
  #     - "&7点击获取帮助"
  #   action: command
  #   command: "help gems"
