# Stats Display
stats:
  header: "&e=== {player} &eUpgrade Statistics ==="
  total-upgrades: "&7Total Upgrades: &f{value}"
  success-count: "&aSuccess Count: &f{value}"
  failure-count: "&cFailure Count: &f{value}"
  level-drop-count: "&6Level Drops: &f{value}"
  destroyed-count: "&4Items Destroyed: &f{value}"
  success-rate: "&bSuccess Rate: &f{value}"
  level-reached-header: "&e--- Level Achievements ---"
  level-reached-item: "  &7+{level}: &f{count} times"

