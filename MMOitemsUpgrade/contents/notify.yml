# Upgrade Level Notification Configuration

notifications:
  # When reaching level 5
  level-5:
    level: 5
    # Server-wide broadcast message (Supports multiple lines)
    broadcast:
      enabled: true
      messages:
        - ""
        - "&6[Upgrade Announcement] &f{player}'s &eitem &f{item} &ehas been upgraded to &c+{level}!"
        - ""
      # Preview settings
      preview:
        enabled: true
        hover: "&bClick to view player's upgraded item"
    # Achievement popup (Toast) (1.12+)
    toast:
      enabled: false
      icon: "DIAMOND_SWORD"
      frame: "CHALLENGE"  # TASK, GOAL, CHALLENGE
      title: "&eUpgrade Achievement"
      description: "&7Item upgrade reached +{level}"
    # Title message (Sent to the upgrader)
    title:
      enabled: true
      title: "&6&lUpgrade Success!"
      subtitle: "&eYour item has reached +{level}"
      fade-in: 10
      stay: 40
      fade-out: 10
    # Actionbar message (Sent to the upgrader)
    actionbar:
      enabled: false
      message: "&aUpgrade Success! Current level: +{level}"
      
  # When reaching level 10
  level-10:
    level: 10
    broadcast:
      enabled: true
      messages:
        - ""
        - "&6╔══════════════════════════════════╗"
        - "&6║    &f{player}'s &eitem reached &c+{level}!"
        - "&6║    &fItem: {item}"
        - "&6╚══════════════════════════════════╝"
        - ""
      # Preview settings
      preview:
        enabled: true
        hover: "&d&l[!] &fClick to preview legendary equipment &d&l[!]"
    toast:
      enabled: true
      icon: "NETHER_STAR"
      frame: "CHALLENGE"
      title: "&6Legendary Upgrade"
      description: "&fItem upgrade reached +{level}"
    title:
      enabled: true
      title: "&6&lLegendary Upgrade!"
      subtitle: "&cCongratulations on reaching max level!"
      fade-in: 10
      stay: 60
      fade-out: 20
    actionbar:
      enabled: false
      message: "&6Congratulations on reaching max upgrade level!"
