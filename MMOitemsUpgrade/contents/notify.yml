# 强化等级通知配置

notifications:
  # 达到5级时
  level-5:
    level: 5
    # 全服广播消息 (支持多行)
    broadcast:
      enabled: true
      messages:
        - ""
        - "&6[强化公告] &f{player} &e的武器 &f{item} &e已强化到 &c+{level}!"
        - ""
      # 预览设置
      preview:
        enabled: true
        hover: "&b点击查看该玩家的强化武器"
    # 成就弹窗 (1.12+)
    toast:
      enabled: false
      icon: "DIAMOND_SWORD"
      frame: "CHALLENGE"  # TASK, GOAL, CHALLENGE
      title: "&e强化成就"
      description: "&7武器强化达到 +{level}"
    # Title消息 (发送给强化者)
    title:
      enabled: true
      title: "&6&l强化成功!"
      subtitle: "&e你的武器已达到 +{level}"
      fade-in: 10
      stay: 40
      fade-out: 10
    # Actionbar消息 (发送给强化者)
    actionbar:
      enabled: false
      message: "&a强化成功! 当前等级: +{level}"
      
  # 达到10级时
  level-10:
    level: 10
    broadcast:
      enabled: true
      messages:
        - ""
        - "&6╔══════════════════════════════════╗"
        - "&6║    &f{player} &e的武器已强化到 &c+{level}!"
        - "&6║    &f武器: {item}"
        - "&6╚══════════════════════════════════╝"
        - ""
      # 预览设置
      preview:
        enabled: true
        hover: "&d&l[!] &f点击预览传奇装备 &d&l[!]"
    toast:
      enabled: true
      icon: "NETHER_STAR"
      frame: "CHALLENGE"
      title: "&6传奇强化"
      description: "&f武器强化达到 +{level}"
    title:
      enabled: true
      title: "&6&l传奇强化!"
      subtitle: "&c恭喜达到最高等级!"
      fade-in: 10
      stay: 60
      fade-out: 20
    actionbar:
      enabled: false
      message: "&6恭喜达到最高强化等级!"
