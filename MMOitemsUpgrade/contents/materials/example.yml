# Upgrade Material Configuration Example
# This is a multi-file configuration system; you can create any .yml file in the materials folder.
# As long as the format is correct, the plugin will automatically load them.

# Example 1: General sword weapon upgrade configuration
default_sword_config:
  # type: Specify the applicable item type (MMOItems Type)
  # Must be uppercase, e.g., SWORD, AXE, STAFF, etc.
  type: SWORD
  
  # Base upgrade configuration (Levels 1-10)
  base:
    money: 100.0
    exp: 10
    materials:
      - type: VANILLA
        id: IRON_INGOT
        display-name: "&fIron Ingot"
        amount: 2

  # If a specific level is defined, it will override the base configuration.
  # Level-specific configuration
  levels:
    "1":
      money: 100.0
      materials:
        - type: VANILLA
          id: IRON_INGOT
          display-name: "&fIron Ingot"
          amount: 2
    "5": # Level 5 to 6
      money: 500.0
      materials:
        - type: MMOITEMS
          id: MATERIAL:RARE_METAL  # Format: TYPE:ID (e.g., MATERIAL:RARE_METAL, GEM:RUBY, etc.)
          display-name: "&6Rare Metal"
          amount: 1

# Example 2: Custom configuration for a specific item
special_excalibur_config:
  # type: CUSTOM indicates this is a configuration for a specific item
  type: CUSTOM
  
  # item-id: Specify the item ID, format is "Type:ID"
  item-id: SWORD:EXCALIBUR
  
  # Upgrade cost for this item
  levels:
    "1":
      money: 1000.0
      materials:
        - type: VANILLA
          id: DIAMOND
          display-name: "&fDiamond"
          amount: 1
    "10":
      money: 10000.0
      materials:
        - type: MMOITEMS
          id: GEM:LEGENDARY_GEM  # Format: TYPE:ID
          display-name: "&6Legendary Gem"
          amount: 1
    # Example ItemsAdder material configuration
    "15":
      money: 20000.0
      materials:
        - type: ITEMSADDER
          itemsadder-id: "namespace:id" # or "id" (if namespace is empty)
          amount: 1
    # Example CraftEngine material configuration
    "20":
      money: 50000.0
      materials:
        - type: CRAFTENGINE
          craftengine-id: "magic_dust"
          amount: 1
    # Example MythicMobs material configuration
    "25":
      money: 100000.0
      materials:
        - type: MYTHICMOBS
          mythicmobs-id: "SkeletonKingSword"
          amount: 1
    # Example Nexo material configuration
    "30":
      money: 200000.0
      materials:
        - type: NEXO
          nexo-id: "custom_mineral"
          amount: 1
