# 强化材料配置示例
# 这是一个多文件配置系统，你可以在 materials 文件夹下创建任意 .yml 文件
# 只要格式正确，插件都会自动加载

# 示例1：通用的剑类武器强化配置
default_sword_config:
  # type: 指定适用的物品类型 (MMOItems Type)
  # 必须是大写，例如 SWORD, AXE, STAFF 等
  type: SWORD
  
  # 基础强化配置 (1-10级)
  base:
    money: 100.0
    exp: 10
    materials:
      - type: VANILLA
        id: IRON_INGOT
        display-name: "&f铁锭"
        amount: 2

  # 只要定义了具体的等级，就会覆盖基础配置
  # 等级特定配置
  levels:
    "1":
      money: 100.0
      materials:
        - type: VANILLA
          id: IRON_INGOT
          display-name: "&f铁锭"
          amount: 2
    "5": # 5级升6级
      money: 500.0
      materials:
        - type: MMOITEMS
          id: MATERIAL:RARE_METAL  # 格式: TYPE:ID (如 MATERIAL:RARE_METAL, GEM:RUBY 等)
          display-name: "&6稀有金属"
          amount: 1

# 示例2：特定物品的自定义配置
special_excalibur_config:
  # type: CUSTOM 表示这是一个特定物品的配置
  type: CUSTOM
  
  # item-id: 指定物品ID，格式为 "Type:ID"
  item-id: SWORD:EXCALIBUR
  
  # 该物品的强化消耗
  levels:
    "1":
      money: 1000.0
      materials:
        - type: VANILLA
          id: DIAMOND
          display-name: "&f钻石"
          amount: 1
    "10":
      money: 10000.0
      materials:
        - type: MMOITEMS
          id: GEM:LEGENDARY_GEM  # 格式: TYPE:ID
          display-name: "&6传奇宝石"
          amount: 1
    # 示例 ItemsAdder 材料配置
    "15":
      money: 20000.0
      materials:
        - type: ITEMSADDER
          itemsadder-id: "namespace:id" # 或者 "id" (如果namespace为空)
          amount: 1
    # 示例 CraftEngine 材料配置
    "20":
      money: 50000.0
      materials:
        - type: CRAFTENGINE
          craftengine-id: "magic_dust"
          amount: 1
    # 示例 MythicMobs 材料配置
    "25":
      money: 100000.0
      materials:
        - type: MYTHICMOBS
          mythicmobs-id: "SkeletonKingSword"
          amount: 1
    # 示例 Nexo 材料配置
    "30":
      money: 200000.0
      materials:
        - type: NEXO
          nexo-id: "custom_mineral"
          amount: 1
