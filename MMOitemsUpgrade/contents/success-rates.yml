# Upgrade Success Rate Configuration File

# Upgrade Success Rate Configuration
# Format: "Level" or "Min-Max" : Success Rate (0.0-1.0)
success-rates:
  "1-3": 1.0      # Level 1-3: 100% success
  "4-5": 0.9      # Level 4-5: 90% success
  "6-7": 0.8      # Level 6-7: 80% success
  "8-9": 0.7      # Level 8-9: 70% success
  "10-15": 0.6       # Level 10-15: 60% success
  "16-18": 0.5       # Level 16-18: 50% success

# Default maximum level for items without a tier
default-max-level: 10

# Define maximum upgrade level by tier (MMOITEMS_TIER)
tier-max-levels:
  COMMON: 10
  UNCOMMON: 12
  RARE: 14
  EPIC: 16
  LEGENDARY: 18

# Specify upgrade caps for specific items (TYPE:ID format)
# Priority: max(item cap, tier cap)
# Example:
item-max-levels:
  # "SWORD:STARTER_SWORD": 3
  # "ARMOR:MYTHIC_ARMOR": 20
