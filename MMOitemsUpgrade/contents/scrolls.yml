# 强化卷轴配置
# 卷轴通过 MMOItems 的 Type:ID 识别

scrolls:
  # 普通卷轴 (固定 +5%)
  common_scroll:
    mmoitem: "CONSUMABLE:COMMON_SCROLL"
    display-name: "&a普通卷轴"
    type: SUCCESS_RATE
    bonus: 0.05
    
  # 稀有卷轴 (固定 +10%)
  rare_scroll:
    mmoitem: "CONSUMABLE:RARE_SCROLL"
    display-name: "&9稀有卷轴"
    type: SUCCESS_RATE
    bonus: 0.10
    
  # 史诗卷轴 (固定 +20%)
  epic_scroll:
    mmoitem: "CONSUMABLE:EPIC_SCROLL"
    display-name: "&5史诗卷轴"
    type: SUCCESS_RATE
    bonus: 0.20
    
  # 传说卷轴 (固定 +30%)
  legendary_scroll:
    mmoitem: "CONSUMABLE:LEGENDARY_SCROLL"
    display-name: "&6传说卷轴"
    type: SUCCESS_RATE
    bonus: 0.30

  # 随机卷轴(低) - 10%~20%区间
  random_scroll_low:
    mmoitem: "CONSUMABLE:RANDOM_SCROLL_LOW"
    display-name: "&b随机卷轴(低)"
    type: SUCCESS_RATE
    bonus-min: 0.10
    bonus-max: 0.20
    
  # 随机卷轴(高) - 20%~30%区间
  random_scroll_high:
    mmoitem: "CONSUMABLE:RANDOM_SCROLL_HIGH"
    display-name: "&d随机卷轴(高)"
    type: SUCCESS_RATE
    bonus-min: 0.20
    bonus-max: 0.30

  # 强化保护券 - 失败时防止装备销毁，但等级仍会下降
  protection_scroll:
    mmoitem: "CONSUMABLE:PROTECTION_SCROLL"
    display-name: "&6强化保护券"
    type: PROTECTION
    
  # 强化增幅器 - 失败不掉级，但成功率降低
  amplifier_scroll:
    mmoitem: "CONSUMABLE:AMPLIFIER_SCROLL"
    display-name: "&c强化增幅器"
    type: AMPLIFIER
    success-penalty: 0.10  # 成功率降低10%
