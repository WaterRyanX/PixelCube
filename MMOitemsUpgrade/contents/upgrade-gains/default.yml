# Default upgrade attribute gain configuration
# Used when no specific type match is found

# Defined by level range: items less than or equal to this level use this configuration
# Supported formats: +5, -5, 5%, +5%, -5%
levels:
  # Levels 1-5
  1:
    ATTACK_DAMAGE: "3%"
    ATTACK_SPEED: "1%"
  # Levels 6-10
  6:
    ATTACK_DAMAGE: "5%"
    ATTACK_SPEED: "2%"
