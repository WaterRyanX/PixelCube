# MMOItems Item Configuration Example
# Please copy the following content into MMOItems items/CONSUMABLE.yml (or any consumable config file)

# ==========================================
# Enhancement Scroll (Directly sets level) - Corresponds to enhancement-scrolls.yml
# ==========================================

UPGRADE_SCROLL_7:
  base:
    material: PAPER
    name: '&a+7 Enhancement Scroll'
    lore:
    - '&7This is a magical scroll.'
    - ''
    - '&fUsage:'
    - '&7Drag and drop it onto the'
    - '&7MMOItems weapon or armor'
    - '&7you want to upgrade in your inventory.'
    - ''
    - '&eEffect: &fDirectly sets upgrade level to &a+7'
    - '&cNote: &7If current level is already +7 or higher, it cannot be used.'
    custom-model-data: 10001

UPGRADE_SCROLL_10:
  base:
    material: PAPER
    name: '&6+10 Enhancement Scroll'
    lore:
    - '&7An ancient upgrade secret passed down through generations.'
    - ''
    - '&fUsage:'
    - '&7Drag and drop it onto the'
    - '&7MMOItems weapon or armor'
    - '&7you want to upgrade in your inventory.'
    - ''
    - '&eEffect: &fDirectly sets upgrade level to &6+10'
    - ''
    - '&bMythic Quality'
    custom-model-data: 10002

