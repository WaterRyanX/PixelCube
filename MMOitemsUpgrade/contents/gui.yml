# MMOitemsUpgrade GUI Configuration File

# GUI Title
title: "§6§lItem Upgrade"

# GUI Size (Rows, 1-6)
rows: 3

# Slot Configuration
slots:
  # Item Input Slot
  input: 10
  
  # Upgrade Button Slot
  upgrade-button: 19
  
  # Material Input Slots (List)
  materials: [11, 12, 13, 14, 15]
  
  # Scroll Slot
  scroll: 16

# Interface Item Configuration
items:
  # Background Item
  background:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    # Custom Model Data (Optional)
    # custom-model-data: 1000
    # Item Model (1.21+ Optional)
    # item-model: "minecraft:gold_nugget"
  
  # Input Slot Placeholder
  input-placeholder:
    material: RED_STAINED_GLASS_PANE
    name: "&cPlease place item to upgrade"
    # custom-model-data: 1001
  
  # Material Slot Placeholder
  material-display:
    material: ORANGE_STAINED_GLASS_PANE
    name: "&ePlace Materials"
    lore:
      - "&7Please place upgrade materials here"
    # custom-model-data: 1004
  
  # Scroll Slot Placeholder
  scroll-placeholder:
    material: LIGHT_BLUE_STAINED_GLASS_PANE
    name: "&bPlace Scroll"
    lore:
      - "&7Optional: Place success rate boost scroll"
    # custom-model-data: 1005
  
  # Upgrade Button (When conditions are not met) - Intelligently displays missing conditions
  upgrade-button-disabled:
    material: ANVIL
    name: "&cCannot Upgrade"
    # Base lore (Always displayed)
    base-lore:
      - "&7Current Level: &e{current_level}"
      - "&7Target Level: &e{next_level}"
      - ""
    # Displayed when missing money (Variables: {need} required, {have} current, {missing} missing)
    missing-money: "&c✘ Missing Money: &f{missing} &7(Need {need}, have {have})"
    # Displayed when missing experience
    missing-exp: "&c✘ Missing Exp: &f{missing} &7(Need {need}, have {have})"
    # Title when materials are missing
    missing-materials-header: "&c✘ Missing Materials:"
    # Each missing material (Variables: {name} material name, {need} required, {have} current)
    missing-material-item: "  &7- &f{name} &cx{missing} &7(Need {need}, have {have})"
    # Footer lore
    footer-lore:
      - ""
      - "&c[!] Please complete the requirements [!]"
    # Lore displayed when no item is placed in the input slot
    no-item-lore:
      - "&7Please place an MMOItems item first"
    # Custom Model Data (Optional)
    # custom-model-data: 1002
    # Item Model (1.21+ Optional)
    # item-model: "minecraft:anvil"
  
  # Upgrade Button (When conditions are met) - Displays success rate and bonus info
  upgrade-button-enabled:
    material: ANVIL
    name: "&aClick to Upgrade Item"
    # Base info
    base-lore:
      - "&7Current Level: &e{current_level}"
      - "&7Target Level: &e{next_level}"
      - ""
    # Success rate display
    success-rate-line: "&7Success Rate: &b{rate}%"
    # Scroll bonus display (Displayed when scroll is present, Variable: {bonus} bonus value)
    scroll-bonus-line: "&7  └ Scroll Bonus: &a+{bonus}%"
    # Attribute preview title (Displayed when attributes change)
    attribute-preview-header: "&e▸ Attribute Preview:"
    # Each attribute line (Variables: {name} stat name, {current} current value, {next} next level value, {diff} difference)
    attribute-preview-item: "  &7{name}: &f{current} &a→ &e{next} &7(&a+{diff}&7)"
    # AuraSkills bonus area (Displayed only if AuraSkills is installed and has bonuses)
    auraskills-header: "&d▸ AuraSkills Bonus:"
    auraskills-skill-bonus: "  &7Skill Bonus: &a+{bonus}%"
    auraskills-luck-bonus: "  &7Luck Bonus: &a+{bonus}%"
    auraskills-total-bonus: "  &7Total Bonus: &a+{bonus}%"
    auraskills-wisdom-reduction: "  &7Wisdom Reduction: &e-{reduction}% Cost"
    # Cost info
    cost-header: "&6▸ Upgrade Cost:"
    cost-money: "  &7Money: &f{amount}"
    cost-exp: "  &7Exp: &f{amount}"
    cost-material: "  &7{name}: &fx{amount}"
    # Footer
    footer-lore:
      - ""
      - "&e▶ Click to Start Upgrade ◀"

# Custom Button Configuration
# Multiple buttons can be configured, supports command execution
custom-buttons:
  # Example button: Help Info
  help:
    # Slot list, can be placed in multiple positions
    slots: [0]
    # Item material
    material: BOOK
    # Display name
    name: "&eHelp Information"
    # Item lore
    lore:
      - "&7Click to view plugin help"
      - "&7Click again to close"
    # Custom Model Data (Optional)
    # custom-model-data: 10
    # Item Model (1.21+ Optional)
    # item-model: "minecraft:book"
    
    # List of commands to execute on click
    # [console] prefix denotes console execution
    # [player] prefix or no prefix denotes player execution
    # {player} placeholder will be replaced with player name
    commands:
      - "[player] mmoupgrade help"
      - "[close]"
