# MMOitemsUpgrade Configuration File

# Language settings (zh_CN=Simplified Chinese, zh_TW=Traditional Chinese, en_US=English)
language: en_US

# Maximum upgrade level
max-level: 10

# Upgrade cooldown configuration (seconds)
upgrade-cooldown: 5

# Player data storage configuration
storage:
  # Storage type: FILE (File) or SQLITE (Database)
  type: FILE

# Name suffix configuration
name-suffix:
  # Whether to enable name suffix
  enabled: true
  
  # Suffix format ({level} will be replaced by current level)
  # Supports color codes &
  format: " &e[+{level}]"

# Upgrade failure penalty configuration
failure-penalty:
  # Whether to enable failure penalty
  enabled: true
  
  # Level drop threshold (level drop on failure after reaching this level)
  level-drop-threshold: 5
  
  # Number of levels dropped per failure
  level-drop-amount: 1
  
  # Item destruction configuration
  item-destruction:
    # Whether to enable item destruction
    enabled: false
    
    # Destruction level threshold (item might be destroyed on failure at or above this level)
    destruction-threshold: 8
    
    # Destruction chance (0.0-1.0)
    destruction-chance: 0.3

# AuraSkills integration configuration
auraskills:
  # Give skill experience on successful upgrade
  exp-reward:
    enabled: true
    # Skill to give experience to (forging, mining, etc.)
    skill: forging
    # Base experience value
    base-exp: 50.0
    # Additional experience per upgrade level
    exp-per-level: 10.0
  
  # Skill level affects upgrade success rate
  skill-bonus:
    enabled: true
    # Skill that affects success rate
    skill: forging
    # Success rate bonus per level (0.001 = 0.1%)
    bonus-per-level: 0.001
    # Maximum bonus cap (0.15 = 15%)
    max-bonus: 0.15
  
  # Stats affect upgrade
  stat-bonus:
    enabled: true
    # Luck stat affects success rate
    luck-stat: luck
    # Success rate bonus per point of luck (0.002 = 0.2%)
    luck-bonus-per-point: 0.002
    # Maximum luck bonus (0.10 = 10%)
    luck-max-bonus: 0.10
    # Wisdom stat affects cost
    wisdom-stat: wisdom
    # Cost reduction ratio per point of wisdom (0.005 = 0.5%)
    wisdom-cost-reduction: 0.005
    # Maximum wisdom cost reduction (0.30 = 30%)
    wisdom-max-reduction: 0.30
