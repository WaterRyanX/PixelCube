# MMOitemsUpgrade 配置文件

# 语言设置 (zh_CN=简体中文, zh_TW=繁体中文, en_US=英文)
language: en_US

# 最大强化等级
max-level: 10

# 强化冷却配置 (秒)
upgrade-cooldown: 5

# 玩家数据存储配置
storage:
  # 存储类型: FILE (文件) 或 SQLITE (数据库)
  type: FILE

# 名称后缀配置
name-suffix:
  # 是否启用名称后缀
  enabled: true
  
  # 后缀格式 ({level}会被替换为当前等级)
  # 支持颜色代码 &
  format: " &e[+{level}]"

# 强化失败惩罚配置
failure-penalty:
  # 是否启用失败惩罚
  enabled: true
  
  # 等级掉落阈值 (达到此等级后失败会掉级)
  level-drop-threshold: 5
  
  # 每次失败掉落的等级数
  level-drop-amount: 1
  
  # 物品销毁配置
  item-destruction:
    # 是否启用物品销毁
    enabled: false
    
    # 销毁等级阈值 (达到此等级后失败可能销毁物品)
    destruction-threshold: 8
    
    # 销毁概率 (0.0-1.0)
    destruction-chance: 0.3

# AuraSkills 集成配置
auraskills:
  # 强化成功时给予技能经验
  exp-reward:
    enabled: true
    # 给予经验的技能 (forging, mining, etc.)
    skill: forging
    # 基础经验值
    base-exp: 50.0
    # 每个强化等级额外增加的经验
    exp-per-level: 10.0
  
  # 技能等级影响强化成功率
  skill-bonus:
    enabled: true
    # 影响成功率的技能
    skill: forging
    # 每级增加的成功率 (0.001 = 0.1%)
    bonus-per-level: 0.001
    # 最大加成上限 (0.15 = 15%)
    max-bonus: 0.15
  
  # 属性影响强化
  stat-bonus:
    enabled: true
    # 幸运属性影响成功率
    luck-stat: luck
    # 每点幸运增加的成功率 (0.002 = 0.2%)
    luck-bonus-per-point: 0.002
    # 幸运最大加成 (0.10 = 10%)
    luck-max-bonus: 0.10
    # 智慧属性影响消耗
    wisdom-stat: wisdom
    # 每点智慧减少的消耗比例 (0.005 = 0.5%)
    wisdom-cost-reduction: 0.005
    # 智慧最大消耗减免 (0.30 = 30%)
    wisdom-max-reduction: 0.30
