# MMOItems 物品配置示例
# 请将以下内容复制到 MMOItems 的 items/CONSUMABLE.yml (或任何消耗品配置文件) 中

# ==========================================
# 强化卷轴 (直接设置等级) - 对应 enhancement-scrolls.yml
# ==========================================

UPGRADE_SCROLL_7:
  base:
    material: PAPER
    name: '&a+7 强化卷轴'
    lore:
    - '&7这是一个神奇的卷轴。'
    - ''
    - '&f使用方式:'
    - '&7在背包中将其&e拖放&7到想要强化的'
    - '&7MMOItems 武器或装备上。'
    - ''
    - '&e效果: &f直接将强化等级设置为 &a+7'
    - '&c注意: &7如果当前等级已超过 +7，将无法使用。'
    custom-model-data: 10001

UPGRADE_SCROLL_10:
  base:
    material: PAPER
    name: '&6+10 强化卷轴'
    lore:
    - '&7流传自上古的强化秘籍。'
    - ''
    - '&f使用方式:'
    - '&7在背包中将其&e拖放&7到想要强化的'
    - '&7MMOItems 武器或装备上。'
    - ''
    - '&e效果: &f直接将强化等级设置为 &6+10'
    - ''
    - '&b神话品质'
    custom-model-data: 10002

